<!doctype html>
<html lang="en">
<head>
    <title>个人信息</title>
    <div th:include="comm/taglib :: taglib"></div>

</head>
<body>

<th:block th:include="comm/left :: left"></th:block>

<th:block th:include="comm/header :: header"></th:block>

<!-- begin::page header -->
<div class="page-header d-md-flex justify-content-between align-items-center">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb m-t-0">
            <li class="breadcrumb-item"><a href="/index.html"><i class="fa fa-home"> 首页</i></a></li>
            <li class="breadcrumb-item"><a href="#">系统设置</a></li>
            <li class="breadcrumb-item active" aria-current="page">个人信息</li>
        </ol>
    </nav>
</div>
<!-- end::page header -->

<!-- begin::main content -->
<main class="main-content">

    <div class="container-fluid">
        <div class="card">
            <div class="card-body">
                <form>
                    <div class="row">
                        <div class="col-sm-4">
                            <div class="form-group">
                                <label for="username">账号</label>
                                <input type="text" class="form-control" id="username" placeholder="请输入账号" autocomplete="off" readonly>
                            </div>
                            <div class="form-group">
                                <label for="nickname">姓名</label>
                                <input type="text" class="form-control" id="nickname" placeholder="请输入姓名" autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label for="idno">证件</label>
                                <input type="text" class="form-control" id="idno" placeholder="请输入身份证号" autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label for="nickname">性别</label>
                                <div class="form-control">
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="sex" id="male" value="0" checked>
                                        <label class="form-check-label" for="male">男</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="sex" id="female" value="1">
                                        <label class="form-check-label" for="female">女</label>
                                    </div>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="username">生日</label>
                                <input type="text" class="form-control datePick" id="birthday" name="birthday" placeholder="请选择生日" autocomplete="off">
                            </div>
                        </div>
                        <div class="col-sm-4">
                            <div class="form-group">
                                <label for="telephone">电话</label>
                                <input type="text" class="form-control" id="telephone" placeholder="请输入电话" autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label for="email">邮箱</label>
                                <input type="text" class="form-control" id="email" placeholder="请输入邮箱" autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label for="profession">职业</label>
                                <input type="text" class="form-control" id="profession" placeholder="请输入职业" autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label for="email">地址</label>
                                <input type="text" class="form-control" id="address" placeholder="请输入地址" autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label for="amount">余额</label>
                                <div class="input-group">
                                    <input type="text" class="form-control" id="amount" placeholder="请输入余额" autocomplete="off" readonly>
                                    <div class="input-group-append">
                                        <button class="btn btn-success" type="button" id="rechargeBtn">充值</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <button type="button" class="btn btn-primary" data-id="" id="save">保存</button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</main>
<!-- end::main content -->

<!-- 充值弹窗 -->
<div class="modal fade" id="rechargeModal" tabindex="-1" role="dialog" aria-labelledby="rechargeModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="rechargeModalLabel">余额充值</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="rechargeAmount">充值金额</label>
                    <input type="number" class="form-control" id="rechargeAmount" placeholder="请输入充值金额" autocomplete="off" min="0.01" step="0.01">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="confirmRecharge">确认充值</button>
            </div>
        </div>
    </div>
</div>

<th:block th:include="comm/footer :: footer"></th:block>
<script>

    //字段回填
    $.get("/user/info", function (result) {
        var obj = result.data;
        $('#username').val(obj.username);
        $('#nickname').val(obj.nickname);
        $('#idno').val(obj.idno);
        $("input[name='sex'][value='" + obj.sex + "']").prop("checked", 'checked');
        $('#birthday').val(obj.birthday);
        $('#telephone').val(obj.telephone);
        $('#email').val(obj.email);
        $('#profession').val(obj.profession);
        $('#address').val(obj.address);
        $('#amount').val(obj.amount);
        $('#save').attr('data-id', obj.id);
        $('#save').attr('data-id', id);
    });

    //绑定充值按钮事件
    $("#rechargeBtn").click(function () {
        $('#rechargeAmount').val('');
        $('#rechargeModal').modal('show');
    });

    //确认充值事件
    $("#confirmRecharge").click(function () {
        var rechargeAmount = $('#rechargeAmount').val();
        if (rechargeAmount == "" || rechargeAmount == null) {
            toastr.warning('请输入充值金额');
            $("#rechargeAmount").focus();
            return;
        }
        if (parseFloat(rechargeAmount) <= 0) {
            toastr.warning('充值金额必须大于0');
            $("#rechargeAmount").focus();
            return;
        }
        var id = $('#save').attr('data-id');
        var data = {
            id: id,
            amount: rechargeAmount
        };
        $.ajax({
            type: "POST",
            async: false,
            url: "/user/recharge",
            dataType: "json",
            contentType: "application/json",
            data: JSON.stringify(data),
            success: function (result) {
                if (result.code == 200) {
                    toastr.success('充值成功！');
                    $('#rechargeModal').modal('hide');
                    // 刷新余额显示
                    $.get("/user/info", function (res) {
                        $('#amount').val(res.data.amount);
                    });
                } else {
                    toastr.error(result.msg);
                }
            }
        });
    });

    //绑定保存事件
    $("#save").click(function () {
        var id = $(this).attr('data-id');
        var username = $('#username').val();
        var nickname = $('#nickname').val();
        var idno = $('#idno').val();
        var sex = $("input[name='sex']:checked").val(); //获取sex的值
        var birthday = $('#birthday').val();
        var telephone = $('#telephone').val();
        var email = $('#email').val();
        var profession = $('#profession').val();
        var address = $('#address').val();
        if (username == "" || username == null) {
            toastr.warning('请输入账号');
            $("#username").focus();
            return;
        }
        if (nickname == "" || nickname == null) {
            toastr.warning('请输入姓名');
            $("#nickname").focus();
            return;
        }
        if (idno == "" || idno == null) {
            toastr.warning('请输入身份证号');
            $("#idno").focus();
            return;
        }
        if (birthday == "" || birthday == null) {
            toastr.warning('请选择生日');
            $("#birthday").focus();
            return;
        }
        if (telephone == "" || telephone == null) {
            toastr.warning('请输入电话');
            $("#telephone").focus();
            return;
        }
        if (email == "" || email == null) {
            toastr.warning('请输入邮箱');
            $("#email").focus();
            return;
        }
        if (profession == "" || profession == null) {
            toastr.warning('请输入职业');
            $("#profession").focus();
            return;
        }
        if (address == "" || address == null) {
            toastr.warning('请输入地址');
            $("#address").focus();
            return;
        }
        var data = {};
        data.id = id;
        data.username = username;
        data.nickname = nickname;
        data.idno = idno;
        data.sex = sex;
        data.birthday = birthday;
        data.telephone = telephone;
        data.email = email;
        data.profession = profession;
        data.address = address;
        $.ajax({
            type: "PUT",
            async: false,//请求同步，必须执行完此ajax,才会去执行后面的js代码
            url: "/user",
            dataType: "json",
            contentType: "application/json",
            data: JSON.stringify(data),
            success: function (data) {
                //后台返回的需要显示的信息列表
                if (data.code == 200) {
                    toastr.success(data.msg);
                } else {
                    toastr.error(data.msg);
                }
            }
        })
    });

</script>
</body>
</html>
