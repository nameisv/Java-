<!doctype html>
<html lang="en">
<head>
    <title>密码修改</title>
    <div th:include="comm/taglib :: taglib"></div>
</head>
<body>

<th:block th:include="comm/left :: left"></th:block>

<th:block th:include="comm/header :: header"></th:block>

<!-- begin::page header -->
<div class="page-header d-md-flex justify-content-between align-items-center">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb m-t-0">
            <li class="breadcrumb-item"><a href="/index.html"><i class="fa fa-home"> 首页</i></a></li>
            <li class="breadcrumb-item"><a href="#">个人设置</a></li>
            <li class="breadcrumb-item active" aria-current="page">修改密码</li>
        </ol>
    </nav>
</div>

<!-- begin::main content -->
<main class="main-content">

    <!-- end::page header -->
    <div class="container-fluid">
        <div class="card">
            <div class="card-body">
                <form>
                    <div class="row">
                        <div class="col-sm-4">
                            <div class="form-group">
                                <label for="oldPwd">原始密码</label>
                                <input type="password" class="form-control" id="oldPwd" placeholder="请输入原始密码" autocomplete="new-password">
                            </div>
                            <div class="form-group">
                                <label for="password">新的密码</label>
                                <input type="password" class="form-control" id="password" placeholder="请输入新的密码" autocomplete="new-password">
                            </div>
                            <div class="form-group">
                                <label for="repeatPwd">确认密码密码</label>
                                <input type="password" class="form-control" id="repeatPwd" placeholder="请输入确认密码" autocomplete="new-password">
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <button type="button" class="btn btn-primary" id="save">保存</button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</main>
<!-- end::main content -->


<th:block th:include="comm/footer :: footer"></th:block>
<script>
    $(document).ready(function () {

        //绑定保存事件
        $("#save").click(function () {
            var oldPwd = $('#oldPwd').val();
            var password = $('#password').val();
            var repeatPwd = $('#repeatPwd').val();
            if (oldPwd == "" || oldPwd == null) {
                toastr.warning('请输入原始密码');
                $("#oldPwd").focus();
                return;
            }
            if (password == "" || password == null) {
                toastr.warning('请输入新的密码');
                $("#password").focus();
                return;
            }
            if (repeatPwd != password) {
                toastr.warning('确认密码必须和密码一致');
                $("#repeatPwd").focus();
                return;
            }
            var data = {};
            data.oldPwd = oldPwd;
            data.password = password;
            $.ajax({
                type: "PUT",
                async: false,//请求同步，必须执行完此ajax,才会去执行后面的js代码
                url: "/updatePwd",
                dataType: "json",
                contentType: "application/json",
                data: JSON.stringify(data),
                success: function (data) {
                    //后台返回的需要显示的信息列表
                    if (data.code == 200) {
                        toastr.success(data.msg);
                    } else {
                        toastr.error(data.msg);
                    }
                }
            })
        });



    });

</script>
</body>
</html>
