<!doctype html>
<html lang="en">
<head>
    <title>游乐园管理系统 - 首页</title>
    <th:block th:include="comm/taglib :: taglib"></th:block>
</head>
<body>

<th:block th:include="comm/left :: left"></th:block>

<th:block th:include="comm/header :: header"></th:block>

<!-- begin::page header -->
<div class="page-header d-md-flex justify-content-between align-items-center">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb m-t-0">
            <li class="breadcrumb-item"><a href="/index.html"><i class="fa fa-home"> 首页</i></a></li>
        </ol>
    </nav>
</div>

<!-- begin::main content -->
<main class="main-content">
    <!-- end::page header -->
    <div class="container-fluid">
        <div class="row" th:if="${session.user.role == 0}">
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6>今日用户新增</h6>
                                <h4 class="m-b-0 font-weight-bold" th:text="${userAddNum}">
                                </h4>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6>今日新增订单</h6>
                                <h4 class="m-b-0 font-weight-bold" th:text="${orderAddNum}">
                                    3,137
                                </h4>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6>今日留言新增</h6>
                                <h4 class="m-b-0 font-weight-bold" th:text="${feedbackAddNum}">
                                    $306.20
                                </h4>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6>今日营业总额</h6>
                                <h4 class="m-b-0 font-weight-bold" th:text="${totalAmount}">
                                </h4>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row" th:if="${session.user.role == 0}">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">员工统计</div>
                    <div class="card-body">
                        <div id="chartBing" style="height: 400px"></div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">营业额统计</div>
                    <div class="card-body">
                        <div id="chartZheXian" style="height: 400px"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card" th:if="${session.user.role != 0}">
            <div class="card-body">
                <h5 class="card-title">欢迎使用游乐园管理系统</h5>
                <div class="row">
                    <div class="col-md-12">
                        <div id="carouselExampleIndicators" class="carousel slide" data-ride="carousel">
                            <ol class="carousel-indicators">
                                <li data-target="#carouselExampleIndicators" data-slide-to="0" class="active"></li>
                                <li data-target="#carouselExampleIndicators" data-slide-to="1"></li>
                            </ol>
                            <div class="carousel-inner">
                                <div class="carousel-item active">
                                    <img src="/media/image/banner1.jpg" class="d-block w-100" alt="...">
                                </div>
                                <div class="carousel-item">
                                    <img src="/media/image/banner2.jpg" class="d-block w-100" alt="...">
                                </div>
                            </div>
                            <a class="carousel-control-prev" href="#carouselExampleIndicators" role="button"
                               data-slide="prev">
                                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                <span class="sr-only">Previous</span>
                            </a>
                            <a class="carousel-control-next" href="#carouselExampleIndicators" role="button"
                               data-slide="next">
                                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                <span class="sr-only">Next</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</main>
<!-- end::main content -->

<th:block th:include="comm/footer :: footer"></th:block>
<!--图表插件-->
<script type="text/javascript" src="/vendors/echarts/echarts.js"></script>
<script type="text/javascript">

    //技师统计
    let chartBing = echarts.init(document.getElementById('chartBing'));
    //营业额增长趋势图
    let chartZheXian = echarts.init(document.getElementById('chartZheXian'));

    let chartBingOption = {
        title: {
            text: '订单统计',
            subtext: '',
            left: 'center'
        },
        tooltip: {
            trigger: 'item'
        },
        legend: {
            orient: 'vertical',
            trigger: 'item',
            left: 'left'
        },
        toolbox: {
            show: true,
            feature: {
                mark: { show: true },
                dataView: { show: true, readOnly: false },
                restore: { show: true },
                saveAsImage: { show: true }
            }
        },
        series: [
            {
                name: '订单统计',
                type: 'pie',
                radius: [50, 150],
                center: ['50%', '60%'],
                roseType: 'area',
                itemStyle: {
                    borderRadius: 8
                },
                data: []
            }
        ]
    }

    let chartZheXianOption = {
        title: {
            text: '营业额统计',
            left: 'center'
        },
        xAxis: {
            type: 'category',
            name: '月份',
            data: []
        },
        yAxis: {
            type: 'value',
            name: '金额'
        },
        toolbox: {
            show: true,
            feature: {
                mark: { show: true },
                dataView: { show: true, readOnly: false },
                restore: { show: true },
                saveAsImage: { show: true }
            }
        },
        series: [
            {
                data: [],
                type: 'line'
            }
        ]
    }

    $.get("/count/", function (result) {
        if (result.code === 200) {
            const orderList = result.data.orderList
            const monthList = result.data.monthList;
            const amountList = result.data.amountList;
            // 绘制饼状图
            chartBingOption.series[0].data = orderList
            chartBing.setOption(chartBingOption);
            //绘制折线图
            chartZheXianOption.xAxis.data = monthList;
            chartZheXianOption.series[0].data = amountList;
            chartZheXian.setOption(chartZheXianOption);
        }
    });

</script>
</body>
</html>
