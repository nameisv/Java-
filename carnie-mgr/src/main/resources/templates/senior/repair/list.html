<!doctype html>
<html lang="en">
<head>
    <title>报修监控</title>
    <div th:include="comm/taglib :: taglib"></div>
</head>
<body>

<th:block th:include="comm/left :: left"></th:block>
<th:block th:include="comm/header :: header"></th:block>

<div class="page-header d-md-flex justify-content-between align-items-center">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb m-t-0">
            <li class="breadcrumb-item"><a href="/index.html"><i class="fa fa-home"> 首页</i></a></li>
            <li class="breadcrumb-item active" aria-current="page">报修监控</li>
        </ol>
    </nav>
</div>

<main class="main-content">
    <div class="container-fluid">
        <div class="card">
            <div class="card-body">
                <table id="dataTable" class="table table-bordered">
                    <thead>
                    <tr>
                        <th>报修标题</th>
                        <th>报修区域</th>
                        <th>报修内容</th>
                        <th>申请人</th>
                        <th>维修员</th>
                        <th>状态</th>
                        <th>申请时间</th>
                        <th>受理时间</th>
                        <th>完成时间</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                </table>
            </div>
        </div>
    </div>
</main>

<th:block th:include="comm/footer :: footer"></th:block>

<script>
    let dataTable;
    
    $(document).ready(function () {
        // 初始化数据表
        dataTable = $('#dataTable').DataTable({
            processing: true,
            serverSide: true,
            ordering: false,
            searching: false,
            paging: true,
            pagingType: "full_numbers",
            pageLength: 10,
            info: true,
            ajax: {
                url: '/repair/list',
                type: 'POST',
                data: function (d) {
                    return d;
                }
            },
            columns: [
                {data: 'title'},
                {data: 'area'},
                {data: 'content'},
                {data: 'employeeName'},
                {
                    data: 'repairName',
                    render: function (data) {
                        return data ? data : '<span class="text-muted">待分配</span>';
                    }
                },
                {
                    data: 'status',
                    render: function (data) {
                        if (data == 0) {
                            return '<span class="badge badge-warning">待受理</span>';
                        } else if (data == 1) {
                            return '<span class="badge badge-info">维修中</span>';
                        } else {
                            return '<span class="badge badge-success">已完成</span>';
                        }
                    }
                },
                {data: 'createTime'},
                {
                    data: 'receiveTime',
                    render: function (data) {
                        return data ? data : '-';
                    }
                },
                {
                    data: 'completeTime',
                    render: function (data) {
                        return data ? data : '-';
                    }
                },
                {
                    data: 'id',
                    render: function (data, type, row) {
                        return '<button class="btn btn-sm btn-info acknowledge-btn" data-id="' + data + '">已知晓</button>';
                    }
                }
            ],
            language: {
                url: '/vendors/dataTable/Chinese.json'
            }
        });
    });

    // 页面加载时标记高级员工已查看
    $(document).ready(function() {
        $.ajax({
            type: 'POST',
            url: '/repair/senior/markViewed',
            dataType: 'json',
            success: function (result) {
                // 刷新小红点
                if (typeof updateSeniorRepairBadge === 'function') {
                    updateSeniorRepairBadge();
                }
            }
        });
    });

    // 已知晓按钮
    $(document).on('click', '.acknowledge-btn', function () {
        let id = $(this).data('id');
        toastr.success('已知晓该报修！');
    });
</script>

</body>
</html>
