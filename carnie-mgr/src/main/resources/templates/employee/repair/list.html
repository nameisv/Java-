<!doctype html>
<html lang="en">
<head>
    <title>我的报修</title>
    <div th:include="comm/taglib :: taglib"></div>
</head>
<body>

<th:block th:include="comm/left :: left"></th:block>
<th:block th:include="comm/header :: header"></th:block>

<div class="page-header d-md-flex justify-content-between align-items-center">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb m-t-0">
            <li class="breadcrumb-item"><a href="/index.html"><i class="fa fa-home"> 首页</i></a></li>
            <li class="breadcrumb-item active" aria-current="page">我的报修</li>
        </ol>
    </nav>
</div>

<main class="main-content">
    <div class="container-fluid">
        <div class="card">
            <div class="card-body">
                <button type="button" class="btn btn-primary mb-3" id="addBtn">
                    <i class="fa fa-plus"></i> 申请报修
                </button>
                <table id="dataTable" class="table table-bordered">
                    <thead>
                    <tr>
                        <th>报修标题</th>
                        <th>报修区域</th>
                        <th>报修内容</th>
                        <th>维修员</th>
                        <th>状态</th>
                        <th>申请时间</th>
                        <th>受理时间</th>
                        <th>完成时间</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                </table>
            </div>
        </div>
    </div>
</main>

<!-- 添加报修弹窗 -->
<div class="modal fade" id="addModal" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">申请报修</h5>
                <button type="button" class="close" data-dismiss="modal">
                    <span>&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <form>
                    <div class="form-group">
                        <label>报修标题 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="title" placeholder="请输入报修标题">
                    </div>
                    <div class="form-group">
                        <label>报修区域 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="area" placeholder="请输入报修区域，如：过山车区域">
                    </div>
                    <div class="form-group">
                        <label>报修内容 <span class="text-danger">*</span></label>
                        <textarea class="form-control" id="content" rows="4" placeholder="请详细描述报修问题"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="saveBtn">提交报修</button>
            </div>
        </div>
    </div>
</div>

<th:block th:include="comm/footer :: footer"></th:block>

<script>
    let dataTable;
    
    $(document).ready(function () {
        // 初始化数据表
        dataTable = $('#dataTable').DataTable({
            processing: true,
            serverSide: true,
            ordering: false,
            searching: false,
            paging: true,
            pagingType: "full_numbers",
            pageLength: 10,
            info: true,
            ajax: {
                url: '/repair/list',
                type: 'POST',
                data: function (d) {
                    return d;
                }
            },
            columns: [
                {data: 'title'},
                {data: 'area'},
                {data: 'content'},
                {
                    data: 'repairName',
                    render: function (data) {
                        return data ? data : '<span class="text-muted">待分配</span>';
                    }
                },
                {
                    data: 'status',
                    render: function (data) {
                        if (data == 0) {
                            return '<span class="badge badge-warning">待受理</span>';
                        } else if (data == 1) {
                            return '<span class="badge badge-info">维修中</span>';
                        } else {
                            return '<span class="badge badge-success">已完成</span>';
                        }
                    }
                },
                {data: 'createTime'},
                {
                    data: 'receiveTime',
                    render: function (data) {
                        return data ? data : '-';
                    }
                },
                {
                    data: 'completeTime',
                    render: function (data) {
                        return data ? data : '-';
                    }
                },
                {
                    data: 'id',
                    render: function (data, type, row) {
                        let html = '';
                        if (row.status == 0) {
                            html += '<button class="btn btn-sm btn-danger delete-btn" data-id="' + data + '">删除</button>';
                        }
                        return html || '<span class="text-muted">无</span>';
                    }
                }
            ],
            language: {
                url: '/vendors/dataTable/Chinese.json'
            }
        });
    });

    // 添加报修按钮
    $('#addBtn').click(function () {
        $('#title').val('');
        $('#area').val('');
        $('#content').val('');
        $('#addModal').modal('show');
    });

    // 提交报修
    $('#saveBtn').click(function () {
        let title = $('#title').val();
        let area = $('#area').val();
        let content = $('#content').val();

        if (!title) {
            toastr.warning('请输入报修标题');
            return;
        }
        if (!area) {
            toastr.warning('请输入报修区域');
            return;
        }
        if (!content) {
            toastr.warning('请输入报修内容');
            return;
        }

        let data = {
            title: title,
            area: area,
            content: content
        };

        $.ajax({
            type: 'POST',
            url: '/repair',
            dataType: 'json',
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: function (result) {
                if (result.code == 200) {
                    toastr.success(result.msg);
                    $('#addModal').modal('hide');
                    dataTable.ajax.reload();
                } else {
                    toastr.error(result.msg);
                }
            }
        });
    });

    // 删除报修
    $(document).on('click', '.delete-btn', function () {
        let id = $(this).data('id');
        if (confirm('确定要删除这条报修记录吗？')) {
            $.ajax({
                type: 'DELETE',
                url: '/repair/' + id,
                dataType: 'json',
                success: function (result) {
                    if (result.code == 200) {
                        toastr.success(result.msg);
                        dataTable.ajax.reload();
                    } else {
                        toastr.error(result.msg);
                    }
                }
            });
        }
    });
</script>

</body>
</html>
