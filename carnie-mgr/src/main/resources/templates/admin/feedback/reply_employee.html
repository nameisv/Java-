<!doctype html>
<html lang="en">
<head>
    <title>留言回复</title>
    <th:block th:include="comm/taglib :: taglib"></th:block>
</head>
<body>

<th:block th:include="comm/left :: left"></th:block>

<th:block th:include="comm/header :: header"></th:block>

<!-- begin::page header -->
<div class="page-header d-md-flex justify-content-between align-items-center">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb m-t-0">
            <li class="breadcrumb-item"><a href="/index.html"><i class="fa fa-home"> 首页</i></a></li>
            <li class="breadcrumb-item"><a href="#">留言管理</a></li>
            <li class="breadcrumb-item active" aria-current="page">留言回复</li>
        </ol>
    </nav>
</div>

<!-- begin::main content -->
<main class="main-content">

    <div class="container-fluid">
        <div class="card">
            <div class="card-body">
                <form>
                    <div class="row">
                        <div class="col-sm-9">
                            <div class="form-group">
                                <label for="title">主题</label>
                                <input type="text" class="form-control-plaintext" id="title" readonly>
                            </div>
                            <div class="form-group">
                                <label for="content">留言内容</label>
                                <textarea class="form-control-plaintext" id="content" rows="3" readonly></textarea>
                            </div>
                            <div class="form-group">
                                <label for="reply">回复内容</label>
                                <textarea class="form-control" id="reply" rows="3" placeholder="请输入回复内容" autocomplete="off"></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <button type="button" class="btn btn-primary" id="save" data-id="">保存</button>
                        <a href="/feedback/list" class="btn btn-secondary">返回</a>
                    </div>
                </form>
            </div>
        </div>

    </div>
</main>
<!-- end::main content -->

<th:block th:include="comm/footer :: footer"></th:block>
<script>

    var id = getQueryVariable('id');
    //字段回填
    $.get("/feedback/"+id, function (result) {
        var obj = result.data;
        $('#title').val(obj.title);
        $('#content').val(obj.content);
        $('#reply').val(obj.reply);
        $('#save').attr('data-id', id);
    });

    //绑定保存事件
    $("#save").click(function () {
        var reply = $('#reply').val();
        if (reply == "" || reply == null) {
            toastr.warning('请输入回复内容');
            return;
        }
        var data = {};
        data.id = id;
        data.status = 1;
        data.reply = reply;
        $.ajax({
            type: "PUT",
            async: false,
            url: "/feedback",
            dataType: "json",
            contentType: "application/json",
            data: JSON.stringify(data),
            success: function (data) {
                if (data.code == 200) {
                    toastr.success(data.msg);
                    window.location.href = '/feedback/list'
                } else {
                    toastr.error(data.msg);
                }
            }
        })
    });

</script>
</body>
</html>
