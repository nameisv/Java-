<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>订单管理</title>
    <th:block th:include="comm/taglib :: taglib"></th:block>
</head>
<body>

<th:block th:include="comm/left :: left"></th:block>

<th:block th:include="comm/header :: header"></th:block>

<!-- begin::page header -->
<div class="page-header d-md-flex justify-content-between align-items-center">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb m-t-0">
            <li class="breadcrumb-item"><a href="/index.html"><i class="fa fa-home"> 首页</i></a></li>
            <li class="breadcrumb-item"><a href="#">订单管理</a></li>
            <li class="breadcrumb-item active" aria-current="page">订单列表</li>
        </ol>
    </nav>
</div>
<!-- end::page header -->

<!-- begin::main content -->
<main class="main-content">

    <div class="container-fluid">
        <div class="card">
            <div class="card-body">
                <h6 class="card-title m-b-15">订单信息</h6>
                <table id="dataTable" class="table table-striped"></table>
            </div>
        </div>
    </div>

</main>
<!-- end::main content -->

<th:block th:include="comm/footer :: footer"></th:block>
<script>

    var role = parseInt('[[${session.user.role}]]');

    // 定义表格列（根据角色动态配置）
    var columns = [
        {title: "订单ID", data: 'id', width: '50px'},
        {title: "用户昵称", data: 'nickname', width: '100px'},
        {title: "项目名称", data: 'categoryName', width: '150px'},
        {title: "门票日期", data: 'ticketDate', width: '100px'},
        {
            title: "门票类型",
            data: 'type',
            width: '80px',
            render: function (data, type, row, meta) {
                if (data == 0) {
                    return '<span class="badge badge-pill badge-primary">成人</span>';
                }
                return '<span class="badge badge-pill badge-info">儿童</span>';
            }
        },
        {title: "购买数量", data: 'ticketNum', width: '80px'},
        {title: "总价格", data: 'price', width: '80px'},
        {
            title: "订单状态",
            data: 'status',
            width: '100px',
            render: function (data, type, row, meta) {
                if (data == 0) {
                    return '<span class="badge badge-success">已支付</span>';
                } else if (data == 1) {
                    return '<span class="badge badge-primary">已出票</span>';
                } else {
                    return '<span class="badge badge-secondary">已退票</span>';
                }
            }
        },
        {title: "购买时间", data: 'createTime', width: '150px'}
    ];

    // 管理员(role=0)没有操作列
    if(role !== 0) {
        columns.push({
            title: "操作",
            data: null,
            width: '150px',
            render: function (data, type, row, meta) {
                var html = '<div class="btn-group" role="group">';

                if(role === 2) {
                    // 用户端逻辑
                    // status=0(已支付): 只显示退票按钮
                    if (row.status == 0) {
                        html += '<button type="button" class="btn btn-warning btn-sm" onclick="cancelOrder(' + row.id + ')"><i class="fa fa-undo"> 退票</i></button>';
                    }
                    // status=2(已退票): 只显示删除按钮
                    else if (row.status == 2) {
                        html += '<button type="button" class="btn btn-danger btn-sm" onclick="deleteOrder(' + row.id + ')"><i class="fa fa-trash"> 删除</i></button>';
                    }
                    // status=1(已出票): 无操作
                    else {
                        html += '<span class="text-muted">无操作</span>';
                    }

                } else if(role === 1) {
                    // 员工端逻辑
                    // status=0(已支付): 只显示出票按钮
                    if (row.status == 0) {
                        html += '<button type="button" class="btn btn-success btn-sm" onclick="issueOrder(' + row.id + ')"><i class="fa fa-ticket"> 出票</i></button>';
                    }
                    // status=1(已出票) 或 status=2(已退票): 只显示删除按钮
                    else if (row.status == 1 || row.status == 2) {
                        html += '<button type="button" class="btn btn-danger btn-sm" onclick="deleteOrder(' + row.id + ')"><i class="fa fa-trash"> 删除</i></button>';
                    }
                }

                html += '</div>';
                return html;
            }
        });
    }

    // 初始化Datatable
    var datatable = $('#dataTable').DataTable({
        info: true,
        scrollY: "400px",
        scrollCollapse: true,
        dom: "<'row'<'col-sm-12'tr>>" +
            "<'row'<'col-sm-5'li><'col-sm-7'p>>",
        ordering: false,
        searching: false,
        serverSide: true,
        processing: true,
        paging: true,
        pagingType: "full_numbers",
        pageLength: 10,
        aLengthMenu: [10, 20, 50, 100],
        ajax: {
            "url": "/order/list",
            "type": "POST",
            "data": function (d) {
                // 可以添加筛选条件
            }
        },
        columns: columns,
        language: {
            "sProcessing": "处理中...",
            "sLengthMenu": "显示 _MENU_ 条 / 页",
            "sZeroRecords": "没有匹配结果",
            "sInfo": "，共 _TOTAL_ 条",
            "sInfoEmpty": "，共 0 条",
            "sInfoFiltered": "(由 _MAX_ 项结果过滤)",
            "sInfoPostFix": "",
            "sSearch": "搜索:",
            "sUrl": "",
            "sEmptyTable": "表中数据为空",
            "sLoadingRecords": "载入中...",
            "sInfoThousands": ",",
            "oPaginate": {
                "sFirst": "首页",
                "sPrevious": "上页",
                "sNext": "下页",
                "sLast": "末页"
            },
            "oAria": {
                "sSortAscending": ":以升序排列此列",
                "sSortDescending": ":以降序排列此列"
            }
        },
    });

    // 退票功能（用户端）
    function cancelOrder(id) {
        swal({
            title: "确认退票吗?",
            text: "退票后将返还余额到账户！",
            icon: "warning",
            buttons: ["取消", "确定"],
            dangerMode: true,
        }).then((ok) => {
            if (ok) {
                $.ajax({
                    type: "PUT",
                    url: "/order/cancel",
                    dataType: "json",
                    contentType: "application/json",
                    data: JSON.stringify({id: id}),
                    success: function (data) {
                        if (data.code == 200) {
                            toastr.success(data.msg);
                            $('#dataTable').DataTable().ajax.reload();
                        } else {
                            toastr.error(data.msg);
                        }
                    },
                    error: function() {
                        toastr.error('操作失败，请稍后重试');
                    }
                })
            }
        });
    }

    // 出票功能（员工端）
    function issueOrder(id) {
        swal({
            title: "确认出票吗?",
            text: "出票后用户将无法退票！",
            icon: "warning",
            buttons: ["取消", "确定"],
            dangerMode: true,
        }).then((ok) => {
            if (ok) {
                $.ajax({
                    type: "PUT",
                    url: "/order/issue",
                    dataType: "json",
                    contentType: "application/json",
                    data: JSON.stringify({id: id}),
                    success: function (data) {
                        if (data.code == 200) {
                            toastr.success(data.msg);
                            $('#dataTable').DataTable().ajax.reload();
                        } else {
                            toastr.error(data.msg);
                        }
                    },
                    error: function() {
                        toastr.error('操作失败，请稍后重试');
                    }
                })
            }
        });
    }

    // 删除订单功能（用户端和员工端）
    function deleteOrder(id) {
        swal({
            title: "确认删除此订单吗?",
            text: "删除后将无法恢复！",
            icon: "warning",
            buttons: ["取消", "确定"],
            dangerMode: true,
        }).then((ok) => {
            if (ok) {
                $.ajax({
                    type: "DELETE",
                    url: "/order/" + id,
                    dataType: "json",
                    success: function (data) {
                        if (data.code == 200) {
                            toastr.success(data.msg);
                            $('#dataTable').DataTable().ajax.reload();
                        } else {
                            toastr.error(data.msg);
                        }
                    },
                    error: function() {
                        toastr.error('操作失败，请稍后重试');
                    }
                })
            }
        });
    }

</script>
</body>
</html>
