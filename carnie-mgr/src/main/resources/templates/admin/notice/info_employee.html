<!doctype html>
<html lang="en">
<head>
    <title>公告详情</title>
    <th:block th:include="comm/taglib :: taglib"></th:block>
</head>
<body>

<th:block th:include="comm/left :: left"></th:block>

<th:block th:include="comm/header :: header"></th:block>

<!-- begin::page header -->
<div class="page-header d-md-flex justify-content-between align-items-center">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb m-t-0">
            <li class="breadcrumb-item"><a href="/index.html"><i class="fa fa-home"> 首页</i></a></li>
            <li class="breadcrumb-item"><a href="#">公告管理</a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${notice.title}"></li>
        </ol>
    </nav>
</div>
<!-- end::page header -->

<!-- begin::main content -->
<main class="main-content">

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-12">
                <div class="card article">
                    <div class="card-body">
                        <h5 th:text="${notice.title}"></h5>
                        <p class="text-muted"><i class="fa fa-clock-o" th:text="${' '+#dates.format(notice.createTime,'yyyy-MM-dd HH:mm:ss')}"></i></p>
                        <div th:utext="${notice.content}"></div>

                        <hr>

                        <!-- 员工端操作按钮 -->
                        <div class="text-center mt-4">
                            <button type="button" class="btn btn-success" id="btnReceived">
                                <i class="fa fa-check-circle"></i> 收到
                            </button>
                            <button type="button" class="btn btn-primary" id="btnCompleted">
                                <i class="fa fa-check"></i> 完成
                            </button>
                            <a href="/notice/list" class="btn btn-secondary">
                                <i class="fa fa-arrow-left"></i> 返回列表
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

</main>
<!-- end::main content -->

<th:block th:include="comm/footer :: footer"></th:block>

<script>
    // 收到按钮点击事件
    var noticeId = '[[${notice.id}]]';

    $("#btnReceived").click(function() {
        $.ajax({
            type: "POST",
            url: "/notice/markReceived",
            data: { noticeId: noticeId },
            dataType: "json",
            success: function(result) {
                if(result.code == 200) {
                    toastr.success("已标记为收到");
                    // 刷新小红点
                    if (typeof updateNoticeBadge === 'function') {
                        updateNoticeBadge();
                    }
                    // 可选：禁用按钮
                    $("#btnReceived").prop('disabled', true);
                } else {
                    toastr.error(result.msg);
                }
            },
            error: function() {
                toastr.error("操作失败,请稍后重试");
            }
        });
    });

    // 完成按钮点击事件
    $("#btnCompleted").click(function() {
        $.ajax({
            type: "POST",
            url: "/notice/markCompleted",
            data: { noticeId: noticeId },
            dataType: "json",
            success: function(result) {
                if(result.code == 200) {
                    toastr.success("已标记为完成");
                    // 刷新小红点
                    if (typeof updateNoticeBadge === 'function') {
                        updateNoticeBadge();
                    }
                    // 可选：禁用按钮
                    $("#btnCompleted").prop('disabled', true);
                } else {
                    toastr.error(result.msg);
                }
            },
            error: function() {
                toastr.error("操作失败,请稍后重试");
            }
        });
    });
</script>

</body>
</html>
